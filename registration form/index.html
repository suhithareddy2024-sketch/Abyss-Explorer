<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Registration Form</h2>

    <form id="registrationForm">

        <div class="input-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname">
            <small class="error" id="nameError"></small>
        </div>

        <div class="input-group">
            <label for="roll">Roll Number</label>
            <input type="text" id="roll">
            <small class="error" id="rollError"></small>
        </div>

        <div class="input-group">
            <label for="email">Email ID</label>
            <input type="email" id="email">
            <small class="error" id="emailError"></small>
        </div>

        <div class="input-group">
            <label for="mobile">Mobile Number</label>
            <input type="text" id="mobile">
            <small class="error" id="mobileError"></small>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password">
            <small class="error" id="passwordError"></small>
        </div>

        <div class="input-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword">
            <small class="error" id="confirmError"></small>
        </div>

        <div class="show-password">
            <input type="checkbox" id="showPassword">
            <label for="showPassword">Show Password</label>
        </div>

        <div class="input-group">
            <label>Gender</label>

            <div class="radio-group">
                <label><input type="radio" name="gender" value="Male"> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
                <label><input type="radio" name="gender" value="Other"> Other</label>
            </div>

            <small class="error" id="genderError"></small>
        </div>

        <div class="input-group">
            <label for="department">Department</label>

            <select id="department">
                <option value="">Select Department</option>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>Mechanical</option>
                <option>Civil</option>
            </select>

            <small class="error" id="departmentError"></small>
        </div>

        <div class="input-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob">
            <small class="error" id="dobError"></small>
        </div>

        <button type="submit">Register</button>

        <p id="successMessage"></p>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
